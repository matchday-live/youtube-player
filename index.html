<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        html, body {
          margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; overflow: hidden;
        }
        .embed-container {
          position: relative; width: 100%; height: 100%;
        }
        iframe {
          width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>

<div class="embed-container" id="player-wrapper">
    <!-- Built dynamically to completely avoid cross-origin post-load errors -->
</div>

<script>
    // 1. Instantly parse the clean video query properties
    const urlParams = new URLSearchParams(window.location.search);
    const targetVideoId = urlParams.get('v') || '4tz_A9nU15M'; 

    // 2. Format the exact embedded path string directly
    const safeEmbedPath = "https://www.youtube.com/embed/" + encodeURIComponent(targetVideoId.trim()) + "?enablejsapi=1&autoplay=0&mute=0&playsinline=1&controls=1&rel=0";

    // 3. Inject the clean DOM element structure cleanly
    const container = document.getElementById('player-wrapper');
    container.innerHTML = '<iframe id="player" src="' + safeEmbedPath + '" allow="autoplay; fullscreen"></iframe>';

    // 4. FIXED: Inject library securely directly into head element (fixes parentNode array crash)
    var tag = document.createElement('script');
    tag.src = "https://youtube.com";
    document.head.appendChild(tag);

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        events: {
          'onStateChange': function(event) {
            if (window.AndroidBridge && typeof window.AndroidBridge.onPlayerStateChange === 'function') {
                window.AndroidBridge.onPlayerStateChange(event.data);
            }
          },
          'onError': function(event) {
            if (window.AndroidBridge && typeof window.AndroidBridge.onPlayerError === 'function') {
                window.AndroidBridge.onPlayerError(event.data);
            }
          }
        }
      });
    }
</script>
</body>
</html>
