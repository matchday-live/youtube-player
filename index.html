<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#player{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div id="player"></div>

<script>

const params = new URLSearchParams(location.search);

const videoId = params.get("v") || "4tz_A9nU15M";

const tag=document.createElement("script");

tag.src="https://www.youtube.com/iframe_api";

document.head.appendChild(tag);

let player;

function onYouTubeIframeAPIReady(){

    player=new YT.Player("player",{

        videoId:videoId,

        playerVars:{
            autoplay:0,
            controls:1,
            rel:0,
            playsinline:1,
            enablejsapi:1,
            origin:location.origin
        },

        events:{

            onReady(){


            },

            onStateChange(event){

                const states={
                    "-1":"UNSTARTED",
                    "0":"ENDED",
                    "1":"PLAYING",
                    "2":"PAUSED",
                    "3":"BUFFERING",
                    "5":"CUED"
                };

            },

            onError(event){


            }

        }

    });

}

</script>

</body>
</html>
