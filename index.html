<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="referrer" content="strict-origin-when-cross-origin">

    <style>
        html, body {
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
            background:#000;
        }

        #player-wrapper,
        #player{
            width:100%;
            height:100%;
        }

        iframe{
            border:0;
            width:100%;
            height:100%;
        }
    </style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
</div>

<script>

const params = new URLSearchParams(location.search);
const videoId = (params.get("v") || "4tz_A9nU15M").trim();

const tag = document.createElement("script");
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

let player;

function onYouTubeIframeAPIReady() {

    player = new YT.Player("player", {

        videoId: videoId,

        playerVars: {

            autoplay:0,
            controls:1,
            rel:0,
            playsinline:1,
            enablejsapi:1,

            origin: window.location.origin
        },

        events:{

            onStateChange(event){

                if(window.AndroidBridge?.onPlayerStateChange){
                    window.AndroidBridge.onPlayerStateChange(event.data);
                }

            },

            onError(event){

                if(window.AndroidBridge?.onPlayerError){
                    window.AndroidBridge.onPlayerError(event.data);
                }

            }

        }

    });

}

</script>

</body>
</html>
