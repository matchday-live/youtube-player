<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        html, body {
          margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; overflow: hidden;
        }
        .embed-container {
          position: relative; width: 100%; height: 100%;
        }
        iframe {
          width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>

<div class="embed-container" id="player-wrapper">
    <!-- The iframe is generated completely dynamically down below to avoid cross-origin updates -->
</div>

<script>
    // 1. Immediately extract the video query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const targetVideoId = urlParams.get('v') || '4tz_A9nU15M'; // Clean fallback logic

    // 2. Build the secure target URL context explicitly
    const cleanEmbedUrl = "https://youtube.com" + encodeURIComponent(targetVideoId.trim()) + "?enablejsapi=1&autoplay=0&mute=0&playsinline=1&controls=1&rel=0";

    // 3. Inject the clean iframe into the DOM instantly BEFORE loading the YouTube script tools
    const wrapper = document.getElementById('player-wrapper');
    wrapper.innerHTML = '<iframe id="player" src="' + cleanEmbedUrl + '" allow="autoplay; fullscreen"></iframe>';

    // 4. Safely load the official YouTube Asynchronous script
    var tag = document.createElement('script');
    tag.src = "https://youtube.com";
    document.head.appendChild(tag);

    var player;
    // 5. Connect your native Android callbacks seamlessly to the container instance
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        events: {
          'onStateChange': function(event) {
            if (window.AndroidBridge && typeof window.AndroidBridge.onPlayerStateChange === 'function') {
                window.AndroidBridge.onPlayerStateChange(event.data);
            }
          },
          'onError': function(event) {
            if (window.AndroidBridge && typeof window.AndroidBridge.onPlayerError === 'function') {
                window.AndroidBridge.onPlayerError(event.data);
            }
          }
        }
      });
    }
</script>
</body>
</html>
