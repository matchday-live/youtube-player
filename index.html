<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#player{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div id="player"></div>

<script>

const params = new URLSearchParams(location.search);

const videoId = params.get("v") || "4tz_A9nU15M";

log("Page Loaded");
log("Video ID:",videoId);
log("Origin:",location.origin);
log("User Agent:",navigator.userAgent);

window.onerror=function(msg,url,line,col,error){
    log("JS ERROR:",msg);
};

window.addEventListener("unhandledrejection",e=>{
    log("Promise Rejection:",e.reason);
});

window.addEventListener("message",event=>{

    if(event.origin.includes("youtube")){

        log("postMessage:",JSON.stringify(event.data));

    }

});

const tag=document.createElement("script");

tag.src="https://www.youtube.com/iframe_api";

tag.onload=()=>{
    log("IFrame API Loaded");
};

tag.onerror=()=>{
    log("Failed to load IFrame API");
};

document.head.appendChild(tag);

let player;

function onYouTubeIframeAPIReady(){

    log("Creating Player");

    player=new YT.Player("player",{

        videoId:videoId,

        playerVars:{
            autoplay:0,
            controls:1,
            rel:0,
            playsinline:1,
            enablejsapi:1,
            origin:location.origin
        },

        events:{

            onReady(){

                log("Player READY");

            },

            onStateChange(event){

                const states={
                    "-1":"UNSTARTED",
                    "0":"ENDED",
                    "1":"PLAYING",
                    "2":"PAUSED",
                    "3":"BUFFERING",
                    "5":"CUED"
                };

                log("State:",states[event.data]);

            },

            onError(event){

                log("Player Error:",event.data);

            }

        }

    });

}

</script>

</body>
</html>
