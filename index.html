<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        html, body {
          margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; overflow: hidden;
        }
        .embed-container {
          position: relative; width: 100%; height: 100%;
        }
        iframe {
          width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>

<div class="embed-container">
    <!-- Initialized with a valid base embedded structure -->
    <iframe id="player" 
            src="https://youtube.com" 
            allow="autoplay; fullscreen">
    </iframe>
</div>

<script>
    // 1. Safely parse the query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const targetVideoId = urlParams.get('v');
    const iframeElement = document.getElementById('player');
    
    // 2. Ensure it explicitly targets the /embed/ route cleanly
    if (targetVideoId && targetVideoId.trim() !== "") {
        iframeElement.src = "https://youtube.com" + encodeURIComponent(targetVideoId.trim()) + "?enablejsapi=1&autoplay=0&mute=0&playsinline=1&controls=1&rel=0";
    }

    // 3. Inject the library securely into the head element (eliminates parentNode bugs)
    var tag = document.createElement('script');
    tag.src = "https://youtube.com";
    document.head.appendChild(tag);

    var player;
    // 4. Hook API events seamlessly to the frame
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        events: {
          'onStateChange': function(event) {
            if (window.AndroidBridge && typeof window.AndroidBridge.onPlayerStateChange === 'function') {
                window.AndroidBridge.onPlayerStateChange(event.data);
            }
          },
          'onError': function(event) {
            if (window.AndroidBridge && typeof window.AndroidBridge.onPlayerError === 'function') {
                window.AndroidBridge.onPlayerError(event.data);
            }
          }
        }
      });
    }
</script>
</body>
</html>
